<!DOCTYPE html>
<html lang="tr">
<head>
<link rel="manifest" href="manifest.json">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Kuran">
<link rel="apple-touch-icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><rect width=%22100%22 height=%22100%22 fill=%22%231A1F2E%22/><path d=%22M65 75A30 30 0 1 1 50 15a40 40 0 0 0 15 60z%22 fill=%22%23C9A84C%22/></svg>">
<title>Kuran-ı Kerim Tilaveti</title>
<style>
:root{-webkit-tap-highlight-color:transparent;}
*{box-sizing:border-box;margin:0;padding:0;}
html,body{width:100%;min-height:100%;}
.app{
  --gold:#C9A84C;--gold-l:#E8C97A;
  --d1:#1A1F2E;--d2:#232A3B;--d3:#2D3650;--d4:#3D4A65;
  --txt:#F0EAD6;--dim:#8A94AA;--grn:#2ECC71;
  --card:var(--d2);--border:var(--d3);
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
  background:var(--d1);width:100%;min-height:100vh;color:var(--txt);
  padding-bottom:env(safe-area-inset-bottom);
}
.app.light{
  --card:#FFFFFF;--border:#E0D8C8;--txt:#1A1A2E;--dim:#7A7A8E;
  --d3:#E0D8C8;--d4:#C8C0B0;--gold:#9A6F2C;--gold-l:#7A5218;
  background:#F5F0E8;color:#1A1A2E;
}

/* ── Üst çubuk ── */
.top-bar{
  background:rgba(35,42,59,.85);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);
  /* Fallback: iPhone status bar ~44-59px */
  padding:52px 20px 14px;
  /* Eski iOS (< 11.2) */
  padding:calc(constant(safe-area-inset-top) + 12px) 20px 14px;
  /* Modern iOS / Android - en az 44px garantili */
  padding:max(env(safe-area-inset-top), 44px) 20px 14px;
  display:flex;align-items:center;gap:14px;
  border-bottom:.5px solid var(--border);position:sticky;top:0;z-index:50;
}
.app.light .top-bar{background:rgba(255,255,255,.85);}
.qicon{width:40px;height:40px;border-radius:11px;background:var(--d3);border:.5px solid var(--gold);display:flex;align-items:center;justify-content:center;color:var(--gold);font-size:22px;flex-shrink:0;}
.app.light .qicon{background:#EDE6D6;}
.top-title{font-size:17px;font-weight:600;color:var(--gold);}
.top-sub{font-size:12px;color:var(--dim);margin-top:2px;}
.theme-btn{
  margin-left:auto;background:var(--d3);border:.5px solid var(--d4);border-radius:22px;
  padding:7px 12px;display:flex;align-items:center;gap:7px;cursor:pointer;
  color:var(--dim);font-size:12px;font-weight:500;white-space:nowrap;transition:all .2s;
}
.app.light .theme-btn{background:#EDE6D6;border-color:#C8C0B0;}
.theme-btn:active{transform:scale(.95);}

/* ── Oynatıcı kartı (kompakt) ── */
.pcard{
  background:var(--card);margin:12px 16px;border-radius:16px;
  border:.5px solid var(--border);padding:14px 16px 12px;
  box-shadow:0 4px 16px rgba(0,0,0,.1);
}
.sinfo{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:10px;}
.il .lbl{font-size:11px;letter-spacing:.1em;text-transform:uppercase;color:var(--dim);margin-bottom:4px;font-weight:600;}
.il .val{font-size:36px;font-weight:600;color:var(--gold-l);line-height:1;}
.il .sub{font-size:12px;color:var(--dim);margin-top:4px;}
.ir{text-align:right;}
.ir-meta{font-size:11px;letter-spacing:.1em;text-transform:uppercase;color:var(--dim);font-weight:600;margin-bottom:2px;}
.ir .lbl{font-size:11px;letter-spacing:.1em;text-transform:uppercase;color:var(--dim);margin-bottom:4px;font-weight:600;}
.ir .sname{font-size:20px;font-weight:600;color:var(--txt);}
.ir .sarab{font-size:24px;color:var(--gold);margin-top:2px;}
.ir .sstat{font-size:12px;color:var(--dim);margin-top:4px;display:flex;align-items:center;gap:6px;justify-content:flex-end;}
.pbar{height:4px;background:var(--border);border-radius:2px;margin-bottom:7px;overflow:hidden;cursor:pointer;}
.pfill{height:100%;background:var(--grn);border-radius:2px;width:0%;transition:width .3s linear;}
.ptimes{display:flex;justify-content:space-between;font-size:12px;color:var(--dim);margin-bottom:12px;font-weight:500;}
.ctrls{display:flex;align-items:center;justify-content:center;gap:12px;}
.cb{
  background:var(--d3);border:.5px solid var(--d4);border-radius:50%;cursor:pointer;
  display:flex;align-items:center;justify-content:center;color:var(--txt);
  transition:all .15s;padding:0;
}
.app.light .cb{background:#EDE6D6;border-color:#C8C0B0;color:#1A1A2E;}
.cb:active{transform:scale(.92);border-color:var(--gold);color:var(--gold);}
.cb.sm{width:44px;height:44px;}
.cb.md{width:50px;height:50px;}
.cb.lg{width:68px;height:68px;background:var(--grn);border-color:var(--grn);color:#fff;box-shadow:0 4px 12px rgba(46,204,113,.3);}
.cb.lg:active{transform:scale(.95);background:#27AE60;}
.cb.xs{width:36px;height:36px;color:var(--dim);}
/* Reset butonu — altın vurgulu */
.cb.reset{border-color:rgba(201,168,76,.4);color:var(--gold);}

/* ── Oynatıcıya gömülü oto-oynat ── */
.auto-row{
  display:flex;align-items:center;justify-content:space-between;
  border-top:.5px solid var(--border);margin-top:12px;padding-top:10px;
}
.albl{font-size:13px;font-weight:500;color:var(--dim);display:flex;align-items:center;gap:8px;}
.tgl{width:44px;height:26px;border-radius:13px;background:var(--d4);position:relative;cursor:pointer;border:none;transition:background .2s;}
.app.light .tgl{background:#C8C0B0;}
.tgl.on{background:var(--grn);}
.tgl::after{content:'';position:absolute;top:3px;left:3px;width:20px;height:20px;border-radius:50%;background:#fff;transition:left .2s;box-shadow:0 2px 4px rgba(0,0,0,.2);}
.tgl.on::after{left:21px;}

/* ── Sure listesi ── */
.shdr{display:flex;align-items:center;justify-content:space-between;padding:0 20px;margin-bottom:10px;}
.slbl{font-size:12px;letter-spacing:.12em;text-transform:uppercase;color:var(--dim);font-weight:600;}
.sbadge{font-size:13px;color:var(--gold);font-weight:500;background:rgba(201,168,76,.12);border:.5px solid rgba(201,168,76,.3);border-radius:20px;padding:5px 13px;cursor:pointer;display:flex;align-items:center;gap:6px;}
.app.light .sbadge{background:rgba(154,111,44,.1);border-color:rgba(154,111,44,.3);}
.lpanel{margin:0 16px 12px;background:var(--card);border-radius:14px;border:.5px solid var(--border);max-height:0;overflow:hidden;transition:max-height .4s cubic-bezier(.25,.8,.25,1);-webkit-overflow-scrolling:touch;}
.lpanel.open{max-height:55vh;overflow-y:auto;}
.lsearch{padding:10px 14px;border-bottom:.5px solid var(--border);position:sticky;top:0;background:var(--card);z-index:1;}
.lsearch input{width:100%;background:var(--d3);border:.5px solid var(--d4);border-radius:10px;padding:10px 14px;font-size:15px;color:var(--txt);-webkit-appearance:none;}
.app.light .lsearch input{background:#EDE6D6;border-color:#C8C0B0;color:#1A1A2E;}
.lsearch input::placeholder{color:var(--dim);}
.lsearch input:focus{outline:none;border-color:var(--gold);}
.si{display:flex;align-items:center;gap:14px;padding:14px;cursor:pointer;border-bottom:.5px solid rgba(61,74,101,.3);transition:background .1s;}
.app.light .si{border-bottom-color:rgba(200,192,176,.5);}
.si:last-child{border-bottom:none;}
.si:active{background:var(--d3);}
.app.light .si:active{background:#EDE6D6;}
.si.act{background:rgba(201,168,76,.15);}
.snum{width:34px;height:34px;border-radius:50%;background:var(--d3);border:.5px solid var(--d4);display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:600;color:var(--dim);flex-shrink:0;}
.app.light .snum{background:#EDE6D6;border-color:#C8C0B0;}
.si.act .snum{background:var(--gold);border-color:var(--gold);color:#1A1F2E;}
.sn{font-size:15px;font-weight:600;color:var(--txt);}
.sm2{font-size:12px;color:var(--dim);margin-top:3px;}
.sar{margin-left:auto;font-size:20px;color:var(--gold);flex-shrink:0;}

/* ── İçerik başlık alanı ── */
.content-hdr{display:flex;align-items:center;padding:0 16px;margin-bottom:10px;gap:8px;}
.view-tabs{display:flex;background:var(--d3);border-radius:10px;padding:3px;gap:2px;flex-shrink:0;}
.app.light .view-tabs{background:#DDD6C8;}
.vtab{padding:6px 13px;border-radius:7px;border:none;font-size:13px;font-weight:600;color:var(--dim);background:transparent;cursor:pointer;transition:all .2s;font-family:inherit;}
.vtab.on{background:var(--gold);color:#1A1F2E;}
.vtab:not(.on):active{background:var(--d4);}
.cur-badge{font-size:13px;color:var(--gold);font-weight:500;background:rgba(201,168,76,.12);border:.5px solid rgba(201,168,76,.3);border-radius:20px;padding:5px 13px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:160px;margin-left:auto;}
.app.light .cur-badge{background:rgba(154,111,44,.1);border-color:rgba(154,111,44,.3);}

/* Tam ekran butonu */
.fs-btn{
  background:var(--d3);border:.5px solid var(--d4);border-radius:8px;
  width:34px;height:34px;display:flex;align-items:center;justify-content:center;
  cursor:pointer;color:var(--dim);transition:all .2s;flex-shrink:0;
}
.app.light .fs-btn{background:#EDE6D6;border-color:#C8C0B0;}
.fs-btn:active{transform:scale(.92);border-color:var(--gold);color:var(--gold);}

/* ── Metin paneli ── */
.mpanel{margin:0 16px 24px;background:var(--card);border-radius:14px;border:.5px solid var(--border);overflow:hidden;}
/* Tam ekran modunda mpanel */
.mpanel.fullscreen{
  position:fixed;inset:0;margin:0;border-radius:0;z-index:200;
  overflow-y:auto;-webkit-overflow-scrolling:touch;
}
.minner{padding:14px;}
.mlng{padding:28px;text-align:center;font-size:15px;color:var(--dim);}

/* ── Tam ekran başlık çubuğu ── */
.fs-header{
  display:none;position:sticky;top:0;z-index:10;
  background:rgba(26,31,46,.97);backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);
  /* Fallback */
  padding:52px 16px 12px;
  /* Eski iOS */
  padding:calc(constant(safe-area-inset-top) + 10px) 16px 12px;
  /* Modern - minimum 44px garantili */
  padding:max(env(safe-area-inset-top), 44px) 16px 12px;
  border-bottom:.5px solid var(--border);
  align-items:center;justify-content:space-between;gap:8px;
}
.app.light .fs-header{background:rgba(245,240,232,.97);}
.mpanel.fullscreen .fs-header{display:flex;}
.mpanel.fullscreen .minner{padding:12px 16px 60px;}
.fs-close{
  background:rgba(201,168,76,.2);border:.5px solid rgba(201,168,76,.4);
  border-radius:50%;width:38px;height:38px;min-width:38px;
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;color:var(--gold);font-size:20px;font-weight:300;
  flex-shrink:0;
}

/* ── Ayet satırları ── */
.ma{padding:6px 0;border-bottom:.5px solid var(--border);display:flex;gap:12px;align-items:flex-start;transition:background .25s,border-radius .25s;border-radius:10px;}
.app.light .ma{border-bottom-color:#E0D8C8;}
.ma:last-child{border-bottom:none;}
.mn{
  min-width:26px;height:26px;border-radius:50%;
  background:rgba(201,168,76,.15);border:.5px solid rgba(201,168,76,.3);
  display:flex;align-items:center;justify-content:center;
  font-size:11px;font-weight:600;color:var(--gold);
  flex-shrink:0;margin-top:2px;transition:all .25s;
}
.mt{font-size:15px;line-height:1.55;color:var(--txt);transition:color .25s;}
.ma.act-v{background:rgba(201,168,76,.12);margin:0 -8px;padding:6px 8px;}
.ma.act-v .mn{background:var(--gold);border-color:var(--gold);color:#1A1F2E;box-shadow:0 0 0 3px rgba(201,168,76,.2);}
.ma.act-v .mt{color:var(--gold-l);}
.mt.okn{font-size:16px;letter-spacing:.01em;}

.ldot{width:8px;height:8px;border-radius:50%;background:var(--grn);animation:blink 1.2s ease-in-out infinite;display:inline-block;}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.2}}
.verse-counter{font-size:12px;color:var(--dim);font-weight:500;display:flex;align-items:center;gap:4px;}
.verse-counter strong{color:var(--gold-l);}
</style>
</head>
<body>
<div class="app" id="app">

  <!-- ── Üst çubuk ── -->
  <div class="top-bar">
    <div class="qicon">☽</div>
    <div>
      <div class="top-title">Kuran-ı Kerim Tilaveti</div>
      <div class="top-sub">Hfz. Mişari Raşid el-Afasi</div>
    </div>
    <button class="theme-btn" onclick="toggleTheme()" aria-label="Tema değiştir">
      <svg id="themeIco" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
      <span id="themeTxt">Açık Tema</span>
    </button>
  </div>

  <!-- ── Oynatıcı (kompakt, oto-oynat dahil) ── -->
  <div class="pcard">
    <div class="sinfo">
      <div class="il">
        <div class="lbl">Sure No.</div>
        <div class="val" id="sNum">1</div>
        <div class="sub" id="sType">Mekki · 7 ayet</div>
      </div>
      <div class="ir">
        <div class="ir-meta">114 Sure · Kur'ân-ı Kerim</div>
        <div class="lbl">Sure / Cüz</div>
        <div class="sname" id="sName">Fâtiha</div>
        <div class="sarab" id="sArab">الفاتحة</div>
        <div class="sstat">
          <span class="ldot" id="ldot" style="display:none"></span>
          <span id="sStat">Hazır</span>
        </div>
      </div>
    </div>
    <div class="pbar">
      <div class="pfill" id="prog"></div>
    </div>
    <div class="ptimes">
      <span id="tC">0:00</span>
      <span id="tT" class="verse-counter">—</span>
    </div>
    <div class="ctrls">
      <button class="cb sm" onclick="prevS()" aria-label="Önceki sure">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="19 20 9 12 19 4 19 20"/><line x1="5" y1="19" x2="5" y2="5"/></svg>
      </button>
      <button class="cb md" onclick="seekB()" aria-label="Önceki ayet">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="19 20 9 12 19 4 19 20"/><polygon points="9 20 9 4"/></svg>
      </button>
      <button class="cb lg" onclick="togglePlay()" aria-label="Oynat/Durdur">
        <svg id="playIco" width="30" height="30" viewBox="0 0 24 24" fill="currentColor"><polygon points="5 3 19 12 5 21 5 3"/></svg>
      </button>
      <button class="cb md" onclick="seekF()" aria-label="Sonraki ayet">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="5 4 15 12 5 20 5 4"/><polygon points="15 4 15 20"/></svg>
      </button>
      <button class="cb sm" onclick="nextS()" aria-label="Sonraki sure">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="5 4 15 12 5 20 5 4"/><line x1="19" y1="5" x2="19" y2="19"/></svg>
      </button>
    </div>
    <!-- Sıfırla butonu — sure başına dön -->
    <div style="display:flex;justify-content:center;margin-top:10px;">
      <button class="cb xs reset" onclick="resetSurah()" aria-label="Sureyi başa al" title="Sureyi başa al" style="border-radius:20px;width:auto;padding:0 14px;gap:6px;display:flex;align-items:center;font-size:12px;font-weight:600;font-family:inherit;">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M1 4v6h6"/><path d="M3.51 15a9 9 0 1 0 .49-4.62"/></svg>
        Sureyi Başa Al
      </button>
    </div>
    <!-- oto-oynat oynatıcı içine gömüldü -->
    <div class="auto-row">
      <span class="albl">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="17 1 21 5 17 9"/><path d="M3 11V9a4 4 0 0 1 4-4h14"/><polyline points="7 23 3 19 7 15"/><path d="M21 13v2a4 4 0 0 1-4 4H3"/></svg>
        Otomatik sıralı oynatma
      </span>
      <button class="tgl" id="autoT" onclick="toggleAuto()" aria-label="Otomatik oynatma"></button>
    </div>
  </div>

  <!-- ── Sure listesi ── -->
  <div class="shdr">
    <span class="slbl">Tüm Sureler</span>
    <button class="sbadge" onclick="toggleList()">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg>
      <span id="listTxt">Listeyi aç</span>
      <svg id="listChv" width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" style="transition:transform .3s"><polyline points="6 9 12 15 18 9"/></svg>
    </button>
  </div>

  <div class="lpanel" id="lPanel">
    <div class="lsearch"><input type="text" id="sq" placeholder="Sure ara..." oninput="filterL()"/></div>
    <div id="lItems"></div>
  </div>

  <!-- ── Metin sekmeleri + tam ekran ── -->
  <div class="content-hdr">
    <div class="view-tabs">
      <button class="vtab on" id="tabMeal" onclick="setView('meal')">Türkçe Meal</button>
      <button class="vtab" id="tabOkn" onclick="setView('okunuş')">Türkçe Okunuş</button>
    </div>
    <button class="fs-btn" onclick="toggleFullscreen()" id="fsBtn" aria-label="Tam ekran" title="Tam ekran">
      <svg id="fsIco" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="15 3 21 3 21 9"/><polyline points="9 21 3 21 3 15"/>
        <line x1="21" y1="3" x2="14" y2="10"/><line x1="3" y1="21" x2="10" y2="14"/>
      </svg>
    </button>
    <span class="cur-badge" id="mBadge">—</span>
  </div>

  <!-- ── Metin paneli ── -->
  <div class="mpanel" id="mPanel">
    <!-- tam ekran modunda gösterilen başlık -->
    <div class="fs-header">
      <div class="view-tabs">
        <button class="vtab on" id="tabMeal2" onclick="setView('meal')">Türkçe Meal</button>
        <button class="vtab" id="tabOkn2" onclick="setView('okunuş')">Türkçe Okunuş</button>
      </div>
      <span style="font-size:13px;color:var(--gold);font-weight:500" id="mBadge2">—</span>
      <button class="fs-close" onclick="toggleFullscreen()" aria-label="Tam ekranı kapat">✕</button>
    </div>
    <div class="minner" id="mInner">
      <div class="mlng">Sure seçin veya oynatmaya başlayın...</div>
    </div>
  </div>

</div>

<script>
// ── Sure listesi ──────────────────────────────────────────────────────────────
const S=[
  {n:"Fâtiha",a:"الفاتحة",v:7,t:"Mekki"},{n:"Bakara",a:"البقرة",v:286,t:"Medeni"},
  {n:"Âl-i İmrân",a:"آل عمران",v:200,t:"Medeni"},{n:"Nisâ",a:"النساء",v:176,t:"Medeni"},
  {n:"Mâide",a:"المائدة",v:120,t:"Medeni"},{n:"En'âm",a:"الأنعام",v:165,t:"Mekki"},
  {n:"A'râf",a:"الأعراف",v:206,t:"Mekki"},{n:"Enfâl",a:"الأنفال",v:75,t:"Medeni"},
  {n:"Tevbe",a:"التوبة",v:129,t:"Medeni"},{n:"Yûnus",a:"يونس",v:109,t:"Mekki"},

const audA=new Audio(), audB=new Audio();

function p3(n){return String(n).padStart(3,'0');}
function fmt(s){s=Math.floor(s||0);return Math.floor(s/60)+':'+(s%60<10?'0':'')+s%60;}

// ── localStorage kayıt / yükle ────────────────────────────
function saveState(){
  try{
    localStorage.setItem('qk_v2',JSON.stringify({
      cur, curVerse:Math.max(0,curVerse), viewMode, autoP
    }));
  }catch(e){}
}
function loadSavedState(){
  try{
    const s=JSON.parse(localStorage.getItem('qk_v2'));
    if(s && typeof s.cur==='number' && s.cur>=0 && s.cur<114) return s;
  }catch(e){}
  return null;
}

function setP(v){
  playing=v;
  document.getElementById('playIco').innerHTML=v?PAUSE:PLAY;
  document.getElementById('ldot').style.display=v?'inline-block':'none';
  document.getElementById('sStat').textContent=v?'Oynatılıyor':'Durduruldu';
}

function updateProgress(){
  const total=verseAudios.length;
  if(!total) return;
  const verseProgress=curVerse/total;
  const inVerse=activeAud.duration?activeAud.currentTime/activeAud.duration/total:0;
  const pct=Math.min(100,Math.round((verseProgress+inVerse)*100));
  document.getElementById('prog').style.width=pct+'%';
  document.getElementById('tC').textContent=fmt(activeAud.currentTime);
  document.getElementById('tT').innerHTML=`<strong>${curVerse+1}</strong>&nbsp;/&nbsp;${total} ayet`;
}

[audA,audB].forEach(a=>{
  a.ontimeupdate=()=>{if(a===activeAud)updateProgress();};
  a.onerror=()=>{if(a===activeAud){setP(false);document.getElementById('sStat').textContent='Yüklenemedi';}};
});

function onVerseEnd(){
  if(!playing) return;
  if(curVerse<verseAudios.length-1){ playVerse(curVerse+1); }
  else{ setP(false); curVerse=-1; document.getElementById('prog').style.width='100%'; if(autoP&&cur<113)setTimeout(()=>sel(cur+1),800); }
}

function playVerse(idx){
  if(idx<0||idx>=verseAudios.length) return;
  curVerse=idx;
  highlightVerse(idx);
  activeAud.onended=null;
  activeAud.src=verseAudios[idx];
  activeAud.onended=onVerseEnd;
  activeAud.play().then(()=>setP(true)).catch(()=>setP(false));
  if(idx+1<verseAudios.length){bufferAud.src=verseAudios[idx+1];bufferAud.load();}
  saveState();
}

// ── Sureyi başa al ────────────────────────────────────────
function resetSurah(){
  if(verseAudios.length>0){ playVerse(0); }
  else{ sel(cur); }
}

function togglePlay(){
  if(!verseAudios.length){sel(cur);return;}
  if(playing){activeAud.pause();setP(false);}
  else{if(curVerse<0)playVerse(0);else activeAud.play().then(()=>setP(true)).catch(()=>setP(false));}
}
function seekB(){if(curVerse>0)playVerse(curVerse-1);}
function seekF(){if(curVerse<verseAudios.length-1)playVerse(curVerse+1);}
function prevS(){if(cur>0)sel(cur-1);}
function nextS(){if(cur<113)sel(cur+1);}

function sel(i, resumeVerse=null){
  cur=i; curVerse=-1; verseAudios=[];
  const token=++loadToken;
  const s=S[i];
  document.getElementById('sNum').textContent=i+1;
  document.getElementById('sName').textContent=s.n;
  document.getElementById('sArab').textContent=s.a;
  document.getElementById('sType').textContent=s.t+' · '+s.v+' ayet';
  const badge=s.n+' (Sure '+(i+1)+')';
  document.getElementById('mBadge').textContent=badge;
  document.getElementById('mBadge2').textContent=badge;
  document.getElementById('prog').style.width='0%';
  document.getElementById('tC').textContent='0:00';
  document.getElementById('tT').innerHTML='—';
  document.getElementById('sStat').textContent='Yükleniyor...';
  activeAud.pause(); activeAud.onended=null; bufferAud.pause();
  setP(false);
  loadVerseAudios(i,token,resumeVerse);
  loadMeal(i); loadOkunus(i);
  renderL();
  saveState();
}

async function loadVerseAudios(idx,token,resumeVerse=null){
  const num=idx+1;
  try{
    const r=await fetch(`https://api.alquran.cloud/v1/surah/${num}/ar.alafasy`);
    const d=await r.json();
    if(token!==loadToken) return;
    if(d.code===200){
      verseAudios=d.data.ayahs.map(a=>a.audio);
      if(resumeVerse!==null && resumeVerse>0 && resumeVerse<verseAudios.length){
        // Kaldığı ayeti yükle ama OTOMATİK OYNATMA — durdurulmuş göster
        curVerse=resumeVerse;
        activeAud.onended=onVerseEnd;
        activeAud.src=verseAudios[resumeVerse];
        activeAud.load();
        highlightVerse(resumeVerse);
        document.getElementById('sStat').textContent='Kaldığı yerden devam et ▶';
        document.getElementById('tT').innerHTML=`<strong>${resumeVerse+1}</strong>&nbsp;/&nbsp;${verseAudios.length} ayet`;
        const pct=Math.round(resumeVerse/verseAudios.length*100);
        document.getElementById('prog').style.width=pct+'%';
        // Sonraki ayeti arkaplanda hazırla
        if(resumeVerse+1<verseAudios.length){bufferAud.src=verseAudios[resumeVerse+1];bufferAud.load();}
      } else {
        playVerse(0);
      }
    } else document.getElementById('sStat').textContent='Ses yüklenemedi';
  }catch(e){if(token===loadToken)document.getElementById('sStat').textContent='Bağlantı hatası';}
}

function highlightVerse(idx){
  const items=document.querySelectorAll('#mInner .ma');
  items.forEach((el,i)=>el.classList.toggle('act-v',i===idx));
  if(items[idx]) items[idx].scrollIntoView({behavior:'smooth',block:'nearest'});
}

// ── Tam ekran ─────────────────────────────────────────────
function toggleFullscreen(){
  isFS=!isFS;
  const panel=document.getElementById('mPanel');
  panel.classList.toggle('fullscreen',isFS);
  document.getElementById('fsIco').innerHTML=isFS?FS_CLOSE_ICO:FS_OPEN;
  // Tam ekranda sekme durumunu senkronize et
  syncTabButtons();
  if(isFS&&curVerse>=0) setTimeout(()=>highlightVerse(curVerse),80);
  // Scroll kilidi
  document.body.style.overflow=isFS?'hidden':'';
}

function syncTabButtons(){
  ['tabMeal','tabMeal2'].forEach(id=>{const el=document.getElementById(id);if(el)el.classList.toggle('on',viewMode==='meal');});
  ['tabOkn','tabOkn2'].forEach(id=>{const el=document.getElementById(id);if(el)el.classList.toggle('on',viewMode==='okunuş');});
}

// ── Görünüm modu ──────────────────────────────────────────
function setView(mode){
  viewMode=mode;
  syncTabButtons();
  renderCurrentContent();
}

function renderCurrentContent(){
  const num=cur+1;
  if(viewMode==='meal'){
    if(mCache[num]) renderMeal(mCache[num]);
    else document.getElementById('mInner').innerHTML='<div class="mlng">Meal yükleniyor...</div>';
  } else {
    if(oCache[num]) renderOkunus(oCache[num]);
    else document.getElementById('mInner').innerHTML='<div class="mlng">Okunuş yükleniyor...</div>';
  }
  if(curVerse>=0) setTimeout(()=>highlightVerse(curVerse),60);
}

async function loadMeal(idx){
  const num=idx+1;
  if(mCache[num]){if(cur===idx&&viewMode==='meal')renderMeal(mCache[num]);return;}
  if(LM[num]){mCache[num]=LM[num];if(cur===idx&&viewMode==='meal')renderMeal(LM[num]);return;}
  if(cur===idx&&viewMode==='meal') document.getElementById('mInner').innerHTML='<div class="mlng">Meal yükleniyor...</div>';
  try{
    const r=await fetch(`https://api.alquran.cloud/v1/surah/${num}/tr.diyanet`);
    const d=await r.json();
    if(d.code===200){mCache[num]=d.data.ayahs.map(x=>x.text);if(cur===idx&&viewMode==='meal')renderMeal(mCache[num]);}
  }catch{}
}

async function loadOkunus(idx){
  const num=idx+1;
  if(oCache[num]){if(cur===idx&&viewMode==='okunuş')renderOkunus(oCache[num]);return;}
  if(LO[num]){oCache[num]=LO[num];if(cur===idx&&viewMode==='okunuş')renderOkunus(LO[num]);return;}
  if(cur===idx&&viewMode==='okunuş') document.getElementById('mInner').innerHTML='<div class="mlng">Okunuş yükleniyor...</div>';
  try{
    const r=await fetch(`https://api.alquran.cloud/v1/surah/${num}/en.transliteration`);
    const d=await r.json();
    if(d.code===200){oCache[num]=d.data.ayahs.map(x=>x.text);if(cur===idx&&viewMode==='okunuş')renderOkunus(oCache[num]);}
  }catch{}
}

function renderMeal(ayahs){
  document.getElementById('mInner').innerHTML=ayahs.map((t,i)=>
    `<div class="ma${curVerse===i?' act-v':''}"><div class="mn">${i+1}</div><div class="mt">${t}</div></div>`).join('');
}
function renderOkunus(ayahs){
  document.getElementById('mInner').innerHTML=ayahs.map((t,i)=>
    `<div class="ma${curVerse===i?' act-v':''}"><div class="mn">${i+1}</div><div class="mt okn">${t}</div></div>`).join('');
}

}
function toggleList(){
  listOpen=!listOpen;
  document.getElementById('lPanel').classList.toggle('open',listOpen);
  document.getElementById('listTxt').textContent=listOpen?'Listeyi kapat':'Listeyi aç';
  document.getElementById('listChv').style.transform=listOpen?'rotate(180deg)':'';
  if(listOpen) renderL();
}
let filt2=S.map((_,i)=>i);
function filterL(){
  const q=document.getElementById('sq').value.toLowerCase();
  filt2=S.map((_,i)=>i).filter(i=>S[i].n.toLowerCase().includes(q)||String(i+1).includes(q));
  renderL();
}
function renderL(){
  document.getElementById('lItems').innerHTML=(filt2||S.map((_,i)=>i)).map(i=>`
    <div class="si${cur===i?' act':''}" onclick="sel(${i})">
      <div class="snum">${i+1}</div>
      <div><div class="sn">${S[i].n}</div><div class="sm2">${S[i].t} · ${S[i].v} ayet</div></div>
      <div class="sar">${S[i].a}</div>
    </div>`).join('');
}

// ── Başlat: kayıtlı durumdan devam et ────────────────────
(function(){
  const saved = loadSavedState();
  if(saved){
    viewMode = saved.viewMode || 'meal';
    autoP    = saved.autoP   || false;
    document.getElementById('autoT').classList.toggle('on', autoP);
    syncTabButtons();
    sel(saved.cur, saved.curVerse); // kaldığı sure + ayet, OYNATMADAN
  } else {
    sel(0);
  }
})();
</script>
